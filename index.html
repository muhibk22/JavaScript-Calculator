<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: aquamarine;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            margin-bottom: 10px;
            padding: 5px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        #result {

            padding: 5px;
            margin: 5px;
            width: 25%;
            box-sizing: border-box;
        }

        footer {
            text-align: start;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #f1f1f1;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h2>Simple Calculator</h2>
    <hr>

    <label for="numInput1">Number 1:</label>
    <input type="number" id="numInput1" placeholder="Enter number">

    <label for="operator">Operator:</label>
    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <label for="numInput2">Number 2:</label>
    <input type="number" id="numInput2" placeholder="Enter number">

    <button onclick="performCalculation()">Calculate</button>

    <br>
    <br>

    <label for="result">Result:</label>
    <input type="text" id="result" readonly>

    <script>
        function performCalculation() {
            var num1 = parseFloat(document.getElementById('numInput1').value) || 0;
            var operator = document.getElementById('operator').value;
            var num2 = parseFloat(document.getElementById('numInput2').value) || 0;
            var result;

            switch (operator) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    if (num2 !== 0) {
                        result = num1 / num2;
                    } else {
                        alert("Division by zero is undefined.");
                        return;
                    }
                    break;
                default:
                    alert("Invalid operator");
                    return;
            }

            document.getElementById('result').value = result;
        }
    </script>
    <footer>
        -Muhammad Muhib Khan
    </footer>

</body>

</html>
